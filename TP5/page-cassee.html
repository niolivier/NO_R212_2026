<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon super site</title>
  <style>
    /* ============================
       PROBLÈMES CSS À TROUVER :
       - styles dans le HTML (pas de fichier externe)
       - !important
       - sélecteurs trop spécifiques
       - hauteurs fixes
       - pas de variables CSS
       - pas de responsive
       - pas de transitions
       ============================ */

    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --main-blue: #1a1a2e;
      --bg-intro: #e8e8e8;
      --tag-bg: #e0e7ff;
    }
    body {
      font-family: Arial;
      color: #333;
    }

    .header {
      background: #1a1a2e;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header .titre {
      font-size: 24px;
      font-weight: bold;
    }

    .header .nav ul {
      display: flex;
      list-style: none;
      gap: 20px;
    }

    .header .nav ul li a {
      color: white;
      text-decoration: none;
    }

    .intro {
     padding: 40px 20px;
     text-align: center;
     background: var(--bg-intro);
    }

    .intro-titre {
     font-size: 32px;
     font-weight: bold;
     margin-bottom: 10px;
    }

    .projets-section {
      padding: 20px;
    }

    .projets-section .section-titre {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .filtres-container {
      margin-bottom: 15px;
    }

    .filtres-container span {
      display: inline-block;
      padding: 5px 12px;
      margin-right: 8px;
      background: #ddd;
      cursor: pointer;
    }

    :root {
  --main-blue: #1a1a2e;
  --bg-intro: #e8e8e8;
  --tag-bg: #e0e7ff;
    }

    .grille-projets {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .grille-projets {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
    }

    .carte-projet {
     border: 1px solid #ddd;
     padding: 15px;
      background: white;
    }

    .grille-projets .carte-projet .carte-titre {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .grille-projets .carte-projet .carte-description {
      color: #666;
      margin-bottom: 10px;
    }

    .grille-projets .carte-projet .carte-tags span {
      display: inline-block;
      padding: 2px 8px;
      background: #e0e7ff;
      color: #3b4cc0;
      font-size: 12px;
      margin-right: 4px;
    }

    .grille-projets .carte-projet .carte-bouton {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 16px;
      background: #1a1a2e;
      color: white;
      border: none;
      cursor: pointer;
    }

    .modale-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
    }

    .modale-overlay .modale-contenu {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 30px;
      width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modale-overlay .modale-contenu .modale-fermer {
      position: absolute;
      top: 10px; right: 15px;
      font-size: 24px;
      cursor: pointer;
      background: none;
      border: none;
    }

    .footer {
      background: #1a1a2e;
      color: white;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <!-- PROBLÈME : pas de balises sémantiques, tout est en div -->
  <header class="header">
    <h1 class="titre">Portfolio</h1>
    <nav class="nav">
      <ul>
        <li><a href="#projets">Projets</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h2 class="intro-titre">Bienvenue sur mon portfolio</h2>
      <p>Étudiante en MMI, passionnée par le web.</p>
    </section>

    <section class="projets-section" id="projets">
      <h2 class="section-titre">Mes projets</h2>

      <div class="filtres-container">
        <!-- Boutons pour l'accessibilité clavier -->
        <button class="filtre actif" onclick="filtrer('tous', this)">Tous</button>
        <button class="filtre" onclick="filtrer('HTML', this)">HTML</button>
        <button class="filtre" onclick="filtrer('CSS', this)">CSS</button>
        <button class="filtre" onclick="filtrer('JS', this)">JS</button>
      </div>

      <div class="grille-projets" id="grille"></div>
    </section>
  </main>       
  
  <!-- Modale -->
  <div class="modale-overlay" id="modale" aria-hidden="true">
    <div class="modale-contenu" role="dialog">
      <button class="modale-fermer" onclick="fermerModale()">×</button>
      <div id="modale-body"></div>
    </div>
  </div>

  <footer class="footer">
    <p>© 2026 — Mon portfolio</p>
  </footer>

  <script>
    // ============================
    // PROBLÈMES JS À TROUVER :
    // - onclick inline (pas addEventListener)
    // - getElementById au lieu de querySelector
    // - element.style au lieu de classList
    // - pas de gestion clavier (Escape, Tab)
    // - pas d'attributs aria
    // - données et affichage mélangés
    // ============================

    var projets = [
      { id: 1, titre: "Site vitrine", description: "Boulangerie locale.", tags: ["HTML", "CSS"] },
      { id: 2, titre: "Quiz interactif", description: "Application de quiz.", tags: ["JS", "HTML"] },
      { id: 3, titre: "Portfolio v1", description: "Ma première version.", tags: ["HTML", "CSS"] },
      { id: 4, titre: "Dashboard météo", description: "API Open Meteo.", tags: ["JS", "CSS"] }
    ];

    const grille = document.querySelector('#grille'); // Utilisation de querySelector
    const modaleEl = document.querySelector('#modale');

    function afficherProjets(liste) {
      grille.innerHTML = '';
      liste.forEach(p => {
        const carte = document.createElement('article');
        carte.className = 'carte-projet';
        
        // On crée le HTML des tags
        const tagsHTML = p.tags.map(t => `<span>${t}</span>`).join('');

        carte.innerHTML = `
          <div class="carte-tags">${tagsHTML}</div> <!-- Affichage des tags ici -->
          <h3 class="carte-titre">${p.titre}</h3>
          <p class="carte-description">${p.description}</p>
          <button class="carte-bouton" onclick="ouvrirModale(${p.id})">Voir détail</button>
        `;
        grille.appendChild(carte);
      });
    }

    function filtrer(tag, bouton) {
      document.querySelectorAll('.filtre').forEach(f => f.classList.remove('actif'));
      bouton.classList.add('actif');

      const liste = tag === 'tous' ? projets : projets.filter(p => p.tags.includes(tag));
      afficherProjets(liste);
    }

    function ouvrirModale(id) {
      const projet = projets.find(p => p.id === id);
      document.querySelector('#modale-body').innerHTML = `<h2>${projet.titre}</h2><p>${projet.description}</p>`;
      
      // Utilisation de classList et ARIA
      modaleEl.classList.add('is-visible');
      modaleEl.setAttribute('aria-hidden', 'false');
    }

    function fermerModale() {
      modaleEl.classList.remove('is-visible');
      modaleEl.setAttribute('aria-hidden', 'true');
    }

    // GESTION CLAVIER (ESCAPE)
    window.addEventListener('keydown', (e) => {
      if (e.key === "Escape") fermerModale();
    });

    afficherProjets(projets);
  </script>
</body>
</html>
